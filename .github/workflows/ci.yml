name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gcc-normal:
    name: GCC normal
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Configure
        run: >-
          cmake -S . -B build/ci-gcc
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
      - name: Build
        run: cmake --build build/ci-gcc --parallel 2
      - name: Test
        run: ctest --test-dir build/ci-gcc --output-on-failure

  clang-sanitizers:
    name: Clang ASan and UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Configure
        run: >-
          cmake -S . -B build/ci-clang-sanitize
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DNINLIL_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build/ci-clang-sanitize --parallel 2
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build/ci-clang-sanitize --output-on-failure
