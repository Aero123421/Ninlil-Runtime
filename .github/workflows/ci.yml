name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  optional-composition:
    name: SQLite optional and tests OFF
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # OpenSSL 3 is required for R7 Host private crypto (tests-ON and tests-OFF top-level).
      - name: Install OpenSSL 3 headers and SQLite3
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libssl-dev libsqlite3-dev
      - name: Build portable tests without SQLite discovery
        run: >-
          cmake -S . -B build/ci-no-sqlite
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_DISABLE_FIND_PACKAGE_SQLite3=TRUE
          && cmake --build build/ci-no-sqlite --parallel 2
          && ctest --test-dir build/ci-no-sqlite --output-on-failure
      - name: Build library composition with tests disabled
        run: >-
          cmake -S . -B build/ci-tests-off
          -DCMAKE_BUILD_TYPE=Release
          -DNINLIL_BUILD_TESTS=OFF
          && cmake --build build/ci-tests-off --parallel 2
          && cmake --build build/ci-tests-off --parallel 2
          --target ninlil_runtime_private
      - name: Verify tests-off registers no tests
        run: >-
          test "$(ctest --test-dir build/ci-tests-off -N | tail -1)"
          = "Total Tests: 0"

  ubuntu-dynamic-strict:
    name: Ubuntu dynamic SQLite strict full
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3, OpenSSL 3, and ninja
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev ninja-build binutils
      - name: Configure (shared libsqlite3, strict)
        run: >-
          cmake -S . -B build/ci-ubuntu-dyn -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DNINLIL_ENABLE_STRICT_WARNINGS=ON
          -DNINLIL_SQLITE_LINKAGE=SHARED
      - name: Build
        run: cmake --build build/ci-ubuntu-dyn --parallel 2
      - name: Test full matrix
        run: ctest --test-dir build/ci-ubuntu-dyn --output-on-failure
      - name: R7 T0 crypto acceptance (register + focused run, non-sanitize)
        run: >-
          python3 tools/r7_t0_ctest_gate.py run-focused
          --build-dir build/ci-ubuntu-dyn
          --profile normal
      - name: Debug archive path hygiene (DWARF4 + strings/readelf)
        run: |
          set -euo pipefail
          a=build/ci-ubuntu-dyn/libninlil_posix_sqlite_storage.a
          test -f "$a"
          ninja -C build/ci-ubuntu-dyn -t commands ninlil_posix_sqlite_storage \
            | tr ' ' '\n' | grep -E '^-gdwarf-4$'
          for n in \
            "$PWD/build/ci-ubuntu-dyn/" \
            "$PWD/build/ci-ubuntu-dyn" \
            "$PWD/ports/" \
            "$PWD/include/" \
            "$PWD/src/" \
            "$PWD/CMakeLists.txt"
          do
            if strings "$a" | grep -F "$n"; then
              echo "false-green: absolute needle in Debug archive: $n" >&2
              exit 1
            fi
            if strings "$a" | grep -F "file-prefix-map=$n"; then
              echo "false-green: prefix-map flag re-embedded: $n" >&2
              exit 1
            fi
          done
          # readelf on .a is unreliable; scan extracted objects (no DWARF5 line_str).
          archive="$PWD/$a"
          tmp=$(mktemp -d)
          (cd "$tmp" && ar x "$archive")
          for o in "$tmp"/*; do
            if readelf -S "$o" 2>/dev/null | grep -q debug_line_str; then
              echo "false-green: DWARF5 .debug_line_str still present in $o" >&2
              exit 1
            fi
            if strings "$o" | grep -F "$PWD/"; then
              echo "false-green: absolute workspace path in object $o" >&2
              exit 1
            fi
          done
          rm -rf "$tmp"

  # OSS authority: Ubuntu GCC 13 -O2 Release strict for N6 production + full host
  # CTest. No duplicate job — extends the existing ubuntu-gcc-release-n6-frame.
  #
  # GNU x86 flag detection: CheckCCompilerFlag →
  # NINLIL_HAS_MACCUMULATE_OUTGOING_ARGS, applied as -maccumulate-outgoing-args
  # on N6 production sources so .su kind is static (dynamic .su hard FAIL).
  #
  # Among the R6 required exact-14 CTests (identity asserted below before the
  # single unfiltered full CTest), these cover packaging / leakage / pin:
  #   - n6_tests_off_packaging_gate  → tests-OFF Release install/archive leakage
  #   - n6_chunk_d_private_symbol_leakage{,_self_test} → production nm/strings
  #   - n6_storage_callsite_gate{,_self_test} → accepted-source pin + mutation
  # clang-sanitizers remains the sole full ASan/UBSan CTest job (no dup here).
  #
  # R7 (docs/31 §11.1 / §11.6): same job also hosts GCC Release crypto evidence —
  # libssl/OpenSSL 3, sanitizers OFF, r7_crypto_stack_gate (-O2 / -fstack-usage),
  # and exact-16 normal focused acceptance via r7_t0_ctest_gate. Does not claim
  # T0/R7/HIL complete.
  ubuntu-gcc-release-n6-frame:
    name: Ubuntu GCC 13 Release N6+R7 authority
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install gcc-13 g++-13 ninja OpenSSL 3 SQLite shared headers
        run: >-
          sudo apt-get update && sudo apt-get install -y
          gcc-13 g++-13 ninja-build libsqlite3-dev libssl-dev binutils
      - name: Assert gcc-13 and g++-13 major is exact 13 (fail-closed)
        run: |
          set -euo pipefail
          command -v gcc-13
          command -v g++-13
          # Prefer -dumpfullversion; fall back to -dumpversion.
          for tool in gcc-13 g++-13; do
            ver="$("${tool}" -dumpfullversion 2>/dev/null || true)"
            if test -z "${ver}"; then
              ver="$("${tool}" -dumpversion)"
            fi
            major="${ver%%.*}"
            if test "${major}" != "13"; then
              echo "false-green: ${tool} major must be exact 13; got ver=${ver}" >&2
              "${tool}" -v || true
              exit 1
            fi
            echo "${tool} version OK: ${ver} (major=13)"
          done
      # Fail-closed oracle: force the stable cache probe FALSE so native GNU
      # x86 configure must FATAL_ERROR before the positive authority tree runs.
      # Unique build dir; log is always printed (success / wrong failure = RED).
      - name: Fail-closed negative configure (maccumulate probe forced FALSE)
        run: |
          set -euo pipefail
          neg=build/ci-ubuntu-gcc-rel-n6-macc-neg
          log=${neg}-configure.log
          mkdir -p build
          rm -rf "$neg"
          set +e
          cmake -S . -B "$neg" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-13 \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_C_FLAGS_RELEASE='-O2 -DNDEBUG' \
            -DCMAKE_CXX_FLAGS_RELEASE='-O2 -DNDEBUG' \
            -DNINLIL_ENABLE_STRICT_WARNINGS=ON \
            -DNINLIL_ENABLE_SANITIZERS=OFF \
            -DNINLIL_SQLITE_LINKAGE=SHARED \
            -DNINLIL_HAS_MACCUMULATE_OUTGOING_ARGS=FALSE \
            >"$log" 2>&1
          rc=$?
          set -e
          echo "----- negative configure log (rc=${rc}) -----"
          cat "$log"
          echo "----- end negative configure log -----"
          if test "${rc}" -eq 0; then
            echo "false-green: negative configure succeeded (expected FATAL_ERROR)" >&2
            exit 1
          fi
          if ! grep -F 'GNU x86/x86_64 host requires -maccumulate-outgoing-args' \
               "$log"; then
            echo "false-green: negative configure failed without exact" \
              "maccumulate fatal reason" >&2
            exit 1
          fi
          echo "negative configure FAIL-CLOSED OK (exact fatal reason present)"
      # docs/31 §11.6: exact -O2 authority (CMake default Release is often -O3).
      # EXPORT_COMPILE_COMMANDS feeds n6_gcc13 + r7_crypto_stack_gate evidence.
      - name: Configure (GCC 13 Release -O2 exact, shared SQLite, strict, compile_commands)
        run: >-
          cmake -S . -B build/ci-ubuntu-gcc-rel-n6 -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=gcc-13
          -DCMAKE_CXX_COMPILER=g++-13
          -DCMAKE_C_FLAGS_RELEASE='-O2 -DNDEBUG'
          -DCMAKE_CXX_FLAGS_RELEASE='-O2 -DNDEBUG'
          -DNINLIL_ENABLE_STRICT_WARNINGS=ON
          -DNINLIL_ENABLE_SANITIZERS=OFF
          -DNINLIL_SQLITE_LINKAGE=SHARED
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Assert -maccumulate-outgoing-args feature detection effective
        run: |
          set -euo pipefail
          cache=build/ci-ubuntu-gcc-rel-n6/CMakeCache.txt
          test -f "$cache"
          # CheckCCompilerFlag result must be affirmative on Ubuntu GCC x86_64.
          if ! grep -E '^NINLIL_HAS_MACCUMULATE_OUTGOING_ARGS:(INTERNAL|BOOL)=1$' \
               "$cache"; then
            echo "false-green: NINLIL_HAS_MACCUMULATE_OUTGOING_ARGS not 1" >&2
            grep -E 'MACCUMULATE|HOST_SYSTEM_PROCESSOR|CMAKE_C_COMPILER' \
              "$cache" || true
            exit 1
          fi
          # Compiler identity must be the gcc-13 / g++-13 we selected.
          if ! grep -E 'CMAKE_C_COMPILER:(FILEPATH|STRING)=(.*/)?gcc-13$' "$cache"; then
            echo "false-green: CMAKE_C_COMPILER is not gcc-13 exact" >&2
            grep -E 'CMAKE_C_COMPILER' "$cache" || true
            exit 1
          fi
          if ! grep -E 'CMAKE_CXX_COMPILER:(FILEPATH|STRING)=(.*/)?g\+\+-13$' "$cache"; then
            echo "false-green: CMAKE_CXX_COMPILER is not g++-13 exact" >&2
            grep -E 'CMAKE_CXX_COMPILER' "$cache" || true
            exit 1
          fi
          echo "NINLIL_HAS_MACCUMULATE_OUTGOING_ARGS=1; CMAKE_C_COMPILER=gcc-13; CMAKE_CXX_COMPILER=g++-13"
      - name: Build ninlil_runtime_private (verbose) and capture compile log
        run: |
          set -euo pipefail
          cmake --build build/ci-ubuntu-gcc-rel-n6 --parallel 2 --verbose \
            --target ninlil_runtime_private \
            | tee build/ci-ubuntu-gcc-rel-n6/n6-compile.log
          test -s build/ci-ubuntu-gcc-rel-n6/n6-compile.log
          test -f build/ci-ubuntu-gcc-rel-n6/compile_commands.json
          # Production objects + -fstack-usage .su must both exist after private build
          # (NINLIL strict frame / -fstack-usage evidence; .o alone is insufficient).
          dir=build/ci-ubuntu-gcc-rel-n6/CMakeFiles/ninlil_runtime_private.dir
          test -d "$dir"
          for src in n6_context_store.c n6_record_codec.c n6_crypto_host.c; do
            test -f "$dir/src/radio/${src}.o"
            test -f "$dir/src/radio/${src}.su"
          done
      - name: N6 production compile_commands + strict verbose log gate (gcc-13 -O2 authority)
        run: >-
          python3 tools/n6_gcc13_release_compile_gate.py check
          --src-root "$PWD"
          --compile-commands build/ci-ubuntu-gcc-rel-n6/compile_commands.json
          --verbose-log build/ci-ubuntu-gcc-rel-n6/n6-compile.log
      - name: Full build (all tests/targets)
        run: cmake --build build/ci-ubuntu-gcc-rel-n6 --parallel 2
      - name: Assert core R6 14 + supplemental compile-gate self-test identity
        run: |
          set -euo pipefail
          # Exact name match only (no regex ambiguity).
          # Core required set remains the user-closed 14; supplemental
          # n6_gcc13_release_compile_gate_self_test is exact-one + not-disabled.
          # Full CTest runs once after this step with no -R filter.
          python3 - <<'PY'
          import json
          import subprocess
          import sys
          from collections import Counter

          CORE_REQUIRED = [
              "n6_context_store",
              "n6_chunk_d_private_symbol_leakage",
              "n6_chunk_d_private_symbol_leakage_self_test",
              "n6_tests_off_packaging_gate",
              "n6_heap_ban_gate",
              "n6_heap_ban_gate_self_test",
              "n6_storage_callsite_gate",
              "n6_storage_callsite_gate_self_test",
              "n6_frame_stack_gate",
              "n6_frame_stack_gate_self_test",
              "n6_frame_stack_gate_structure",
              "n6_record_codec",
              "radio_wire_r6_docs_gate",
              "radio_wire_r6_docs_gate_self_test",
          ]
          SUPPLEMENTAL = [
              "n6_gcc13_release_compile_gate_self_test",
          ]
          if len(CORE_REQUIRED) != 14 or len(set(CORE_REQUIRED)) != 14:
              print("internal: CORE_REQUIRED must be exact 14 unique", file=sys.stderr)
              sys.exit(1)

          raw = subprocess.check_output(
              [
                  "ctest",
                  "--test-dir",
                  "build/ci-ubuntu-gcc-rel-n6",
                  "--show-only=json-v1",
              ],
              text=True,
          )
          data = json.loads(raw)
          tests = data.get("tests")
          if not isinstance(tests, list):
              print("false-green: ctest json-v1 missing tests array", file=sys.stderr)
              sys.exit(1)

          names = []
          disabled = set()
          for t in tests:
              if not isinstance(t, dict):
                  print("false-green: non-object test entry", file=sys.stderr)
                  sys.exit(1)
              name = t.get("name")
              if not isinstance(name, str) or not name:
                  print("false-green: test entry missing name", file=sys.stderr)
                  sys.exit(1)
              names.append(name)
              props = t.get("properties") or []
              if isinstance(props, list):
                  for p in props:
                      if not isinstance(p, dict):
                          continue
                      if p.get("name") == "DISABLED":
                          val = str(p.get("value", "")).strip().lower()
                          if val in ("1", "true", "on", "yes"):
                              disabled.add(name)

          counts = Counter(names)
          errs = []
          for req in CORE_REQUIRED + SUPPLEMENTAL:
              c = counts.get(req, 0)
              if c != 1:
                  errs.append(f"{req}: expected exact-once registration, found {c}")
              if req in disabled:
                  errs.append(f"{req}: registered but DISABLED")
          if errs:
              print("R6 core 14 + supplemental identity FAIL:", file=sys.stderr)
              for e in errs:
                  print(" ", e, file=sys.stderr)
              sys.exit(1)
          print(
              "R6 core required 14 + supplemental 1: exact-once and not disabled "
              f"(suite total={len(names)}; core includes tests-OFF packaging, "
              "chunk-D leakage, storage pin/mutation; supplemental is "
              "n6_gcc13_release_compile_gate_self_test)"
          )
          PY
      - name: Full CTest once (unfiltered; core 14 + supplemental compile self-test + rest)
        run: >-
          ctest --test-dir build/ci-ubuntu-gcc-rel-n6
          --output-on-failure
      - name: R7 compile_commands -O2 / -fstack-usage evidence (docs/31 §11.6)
        run: |
          set -euo pipefail
          cc=build/ci-ubuntu-gcc-rel-n6/compile_commands.json
          su=build/ci-ubuntu-gcc-rel-n6/CMakeFiles/ninlil_runtime_private.dir
          test -f "$cc"
          # Prove cache actually carries -O2 authority (not merely YAML text).
          if ! grep -E '^CMAKE_C_FLAGS_RELEASE:STRING=-O2 -DNDEBUG$' \
               build/ci-ubuntu-gcc-rel-n6/CMakeCache.txt; then
            echo "false-green: CMAKE_C_FLAGS_RELEASE is not exact -O2 -DNDEBUG" >&2
            grep CMAKE_C_FLAGS_RELEASE build/ci-ubuntu-gcc-rel-n6/CMakeCache.txt || true
            exit 1
          fi
          python3 tools/r7_crypto_stack_gate.py check \
            --su-dir "$su" \
            --compile-commands "$cc" \
            --require-maccumulate-outgoing-args
      - name: R7 T0 crypto acceptance (register + focused + production stack)
        run: >-
          python3 tools/r7_t0_ctest_gate.py run-focused
          --build-dir build/ci-ubuntu-gcc-rel-n6
          --profile normal

  # Clang Release strict: docs/31 §11.1 pair with GCC Release (Debug Clang
  # remains in clang-non-sanitizer-hygiene). Match -O2 for Release parity;
  # GCC .su / compile_commands authority remains the §11.6 source of truth.
  # Does not claim T0/R7/HIL complete.
  ubuntu-clang-release-r7:
    name: Ubuntu Clang Release R7 authority
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3 and OpenSSL 3
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev
      - name: Configure (Clang Release, strict ON, -O2 parity)
        run: >-
          cmake -S . -B build/ci-ubuntu-clang-rel
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_C_FLAGS_RELEASE="-O2 -DNDEBUG"
          -DNINLIL_ENABLE_STRICT_WARNINGS=ON
          -DNINLIL_ENABLE_SANITIZERS=OFF
          -DNINLIL_SQLITE_LINKAGE=SHARED
      - name: Full Release build
        run: cmake --build build/ci-ubuntu-clang-rel --parallel 2
      - name: Full CTest matrix (Clang Release strict)
        run: ctest --test-dir build/ci-ubuntu-clang-rel --output-on-failure
      - name: R7 T0 crypto acceptance (register + focused + production stack)
        run: >-
          python3 tools/r7_t0_ctest_gate.py run-focused
          --build-dir build/ci-ubuntu-clang-rel
          --profile normal

  ubuntu-static-strict:
    name: Ubuntu static SQLite strict full
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3 (static archive), OpenSSL 3, zlib, ninja
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev zlib1g-dev ninja-build binutils
      - name: Resolve static libsqlite3.a
        id: sqlite_static
        run: |
          a=$(find /usr/lib -name 'libsqlite3.a' 2>/dev/null | head -1)
          test -f "$a"
          echo "lib=$a" >> "$GITHUB_OUTPUT"
      - name: Configure (static libsqlite3.a, strict, --wrap interpose)
        run: >-
          cmake -S . -B build/ci-ubuntu-static -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc
          -DCMAKE_CXX_COMPILER=g++
          -DNINLIL_ENABLE_STRICT_WARNINGS=ON
          -DNINLIL_SQLITE_LINKAGE=STATIC
          -DSQLite3_LIBRARY=${{ steps.sqlite_static.outputs.lib }}
      - name: Build
        run: cmake --build build/ci-ubuntu-static --parallel 2
      - name: Test full matrix
        run: ctest --test-dir build/ci-ubuntu-static --output-on-failure
      - name: R7 T0 crypto acceptance (register + focused run, non-sanitize)
        run: >-
          python3 tools/r7_t0_ctest_gate.py run-focused
          --build-dir build/ci-ubuntu-static
          --profile normal
      - name: Assert wrap backend and no shared sqlite on test binary
        run: |
          set -euo pipefail
          ninja -C build/ci-ubuntu-static -t commands ninlil_posix_sqlite_storage_test \
            | tee /tmp/wrap-cmd.txt
          grep -E -- '--wrap=sqlite3_exec|--wrap=sqlite3_prepare_v2|--wrap=sqlite3_get_autocommit' /tmp/wrap-cmd.txt
          ldd build/ci-ubuntu-static/ninlil_posix_sqlite_storage_test | tee /tmp/static-test-ldd.txt
          if grep -E 'libsqlite3\.so' /tmp/static-test-ldd.txt; then
            echo "static strict test binary still NEEDED libsqlite3.so" >&2
            exit 1
          fi
      - name: Debug archive path hygiene (DWARF4 + strings/readelf)
        run: |
          set -euo pipefail
          a=build/ci-ubuntu-static/libninlil_posix_sqlite_storage.a
          test -f "$a"
          ninja -C build/ci-ubuntu-static -t commands ninlil_posix_sqlite_storage \
            | tr ' ' '\n' | grep -E '^-gdwarf-4$'
          for n in \
            "$PWD/build/ci-ubuntu-static/" \
            "$PWD/build/ci-ubuntu-static" \
            "$PWD/ports/" \
            "$PWD/include/" \
            "$PWD/src/" \
            "$PWD/CMakeLists.txt"
          do
            if strings "$a" | grep -F "$n"; then
              echo "false-green: absolute needle in Debug archive: $n" >&2
              exit 1
            fi
          done
          archive="$PWD/$a"
          tmp=$(mktemp -d)
          (cd "$tmp" && ar x "$archive")
          for o in "$tmp"/*; do
            if readelf -S "$o" 2>/dev/null | grep -q debug_line_str; then
              echo "false-green: DWARF5 .debug_line_str still present in $o" >&2
              exit 1
            fi
            if strings "$o" | grep -F "$PWD/"; then
              echo "false-green: absolute workspace path in object $o" >&2
              exit 1
            fi
          done
          rm -rf "$tmp"

  ubuntu-static-tests-off-consumer:
    name: Ubuntu static tests-off installed consumer
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3, OpenSSL 3, zlib, ninja
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev zlib1g-dev ninja-build binutils
      - name: Resolve static libsqlite3.a
        id: sqlite
        run: |
          a=$(find /usr/lib -name 'libsqlite3.a' 2>/dev/null | head -1)
          test -n "$a"
          test -f "$a"
          echo "lib=$a" >> "$GITHUB_OUTPUT"
          echo "Using static archive: $a"
      - name: Configure tests-off static
        run: >-
          cmake -S . -B build/ci-ubuntu-static-off -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DNINLIL_BUILD_TESTS=OFF
          -DNINLIL_ENABLE_STRICT_WARNINGS=ON
          -DNINLIL_SQLITE_LINKAGE=STATIC
          -DSQLite3_LIBRARY=${{ steps.sqlite.outputs.lib }}
      - name: Build and install
        run: >-
          cmake --build build/ci-ubuntu-static-off --parallel 2
          && cmake --build build/ci-ubuntu-static-off --parallel 2
          --target ninlil_runtime_private
          && cmake --install build/ci-ubuntu-static-off
          --prefix build/ci-ubuntu-static-off/prefix
      - name: External installed consumer build/run with pinned .a
        run: |
          set -euo pipefail
          inc=$(pkg-config --variable=includedir sqlite3 2>/dev/null || true)
          if [ -z "$inc" ]; then inc=/usr/include; fi
          cmake -S tests/cmake/installed_posix_sqlite_consumer \
            -B build/ci-ubuntu-static-off/consumer -G Ninja \
            -DCMAKE_PREFIX_PATH=$PWD/build/ci-ubuntu-static-off/prefix \
            -DCMAKE_BUILD_TYPE=Debug \
            -DNINLIL_CONSUMER_EXPECT_STATIC_SQLITE=ON \
            -DNINLIL_CONSUMER_SQLITE3_LIBRARY=${{ steps.sqlite.outputs.lib }} \
            -DSQLite3_LIBRARY=${{ steps.sqlite.outputs.lib }} \
            -DSQLite3_INCLUDE_DIR=$inc
          cmake --build build/ci-ubuntu-static-off/consumer --parallel 2 --verbose \
            | tee build/ci-ubuntu-static-off/consumer-link.txt
          grep -F 'libsqlite3.a' build/ci-ubuntu-static-off/consumer-link.txt
          if grep -E 'libsqlite3\.so' build/ci-ubuntu-static-off/consumer-link.txt; then
            echo "false-green: shared sqlite on static consumer link line" >&2
            exit 1
          fi
          ctest --test-dir build/ci-ubuntu-static-off/consumer --output-on-failure
          exe=build/ci-ubuntu-static-off/consumer/ninlil_installed_posix_sqlite_consumer
          ldd "$exe" | tee build/ci-ubuntu-static-off/consumer-ldd.txt
          if grep -E 'libsqlite3\.so' build/ci-ubuntu-static-off/consumer-ldd.txt; then
            echo "false-green: NEEDED libsqlite3.so" >&2
            exit 1
          fi
          if command -v readelf >/dev/null; then
            readelf -d "$exe" | tee build/ci-ubuntu-static-off/consumer-readelf.txt
            if grep -E 'libsqlite3\.so' build/ci-ubuntu-static-off/consumer-readelf.txt; then
              echo "false-green: readelf NEEDED libsqlite3.so" >&2
              exit 1
            fi
          fi
      - name: Archive path hygiene (DWARF4 + strings/readelf needles)
        run: |
          set -euo pipefail
          a=build/ci-ubuntu-static-off/prefix/lib/libninlil_posix_sqlite_storage.a
          test -f "$a"
          ninja -C build/ci-ubuntu-static-off -t commands ninlil_posix_sqlite_storage \
            | tr ' ' '\n' | grep -E '^-gdwarf-4$'
          for n in \
            "$PWD/build/ci-ubuntu-static-off/" \
            "$PWD/build/ci-ubuntu-static-off" \
            "$PWD/ports/" \
            "$PWD/include/" \
            "$PWD/src/" \
            "$PWD/CMakeLists.txt"
          do
            if strings "$a" | grep -F "$n"; then
              echo "false-green: absolute needle in Debug archive: $n" >&2
              exit 1
            fi
            if strings "$a" | grep -F "file-prefix-map=$n"; then
              echo "false-green: prefix-map flag re-embedded: $n" >&2
              exit 1
            fi
          done
          archive="$PWD/$a"
          tmp=$(mktemp -d)
          (cd "$tmp" && ar x "$archive")
          for o in "$tmp"/*; do
            if readelf -S "$o" 2>/dev/null | grep -q debug_line_str; then
              echo "false-green: DWARF5 .debug_line_str still present in $o" >&2
              exit 1
            fi
            if strings "$o" | grep -F "$PWD/"; then
              echo "false-green: absolute workspace path in object $o" >&2
              exit 1
            fi
          done
          rm -rf "$tmp"

  clang-sanitizers:
    name: Clang ASan and UBSan (dynamic SQLite)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3 and OpenSSL 3
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev
      - name: Configure
        run: >-
          cmake -S . -B build/ci-clang-sanitize
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DNINLIL_ENABLE_SANITIZERS=ON
          -DNINLIL_SQLITE_LINKAGE=SHARED
      - name: Build
        run: cmake --build build/ci-clang-sanitize --parallel 2
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build/ci-clang-sanitize --output-on-failure
      - name: R7 T0 crypto under ASan/UBSan (no production .su gate)
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: >-
          python3 tools/r7_t0_ctest_gate.py run-focused
          --build-dir build/ci-clang-sanitize
          --profile sanitizer
      - name: Sanitizer artifacts are non-ship (hygiene scan skipped by explicit flag only)
        run: |
          set -euo pipefail
          # Coverage is full (ASan/UBSan ON). Archive absolute-path hygiene is
          # not a ship gate under NINLIL_ENABLE_SANITIZERS=ON — ASan global
          # descriptors embed absolute -c paths. Ship hygiene is enforced by
          # non-sanitizer GCC/Clang jobs and installed-consumer smoke when
          # sanitizers are OFF. Do not disable ASan globals or drop coverage.
          test -f build/ci-clang-sanitize/libninlil_posix_sqlite_storage.a
          grep -E 'NINLIL_ENABLE_SANITIZERS:BOOL=ON' \
            build/ci-clang-sanitize/CMakeCache.txt

  clang-non-sanitizer-hygiene:
    name: Ubuntu Clang non-sanitizer archive hygiene
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3, OpenSSL 3, ninja, binutils
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev ninja-build binutils
      - name: Configure (Clang, sanitizers OFF — ship hygiene gate)
        run: >-
          cmake -S . -B build/ci-clang-nosan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DNINLIL_ENABLE_STRICT_WARNINGS=ON
          -DNINLIL_ENABLE_SANITIZERS=OFF
          -DNINLIL_SQLITE_LINKAGE=SHARED
      - name: Build
        run: cmake --build build/ci-clang-nosan --parallel 2
      - name: Test full matrix
        run: ctest --test-dir build/ci-clang-nosan --output-on-failure
      - name: R7 T0 crypto acceptance (register + focused run, non-sanitize)
        run: >-
          python3 tools/r7_t0_ctest_gate.py run-focused
          --build-dir build/ci-clang-nosan
          --profile normal
      - name: Strict archive strings/ar/readelf path hygiene (ship gate)
        run: |
          set -euo pipefail
          a=build/ci-clang-nosan/libninlil_posix_sqlite_storage.a
          test -f "$a"
          # Must NOT be a sanitizer build — skip path is explicit-flag only.
          if grep -E 'NINLIL_ENABLE_SANITIZERS:BOOL=ON' \
               build/ci-clang-nosan/CMakeCache.txt; then
            echo "false-green: sanitizers ON in non-sanitizer hygiene job" >&2
            exit 1
          fi
          for n in \
            "$PWD/build/ci-clang-nosan/" \
            "$PWD/build/ci-clang-nosan" \
            "$PWD/ports/" \
            "$PWD/include/" \
            "$PWD/src/" \
            "$PWD/CMakeLists.txt"
          do
            if strings "$a" | grep -F "$n"; then
              echo "false-green: absolute needle in Debug archive: $n" >&2
              exit 1
            fi
            if strings "$a" | grep -F "file-prefix-map=$n"; then
              echo "false-green: prefix-map flag re-embedded: $n" >&2
              exit 1
            fi
          done
          archive="$PWD/$a"
          tmp=$(mktemp -d)
          (cd "$tmp" && ar x "$archive")
          test -n "$(ls -A "$tmp")"
          for o in "$tmp"/*; do
            if strings "$o" | grep -F "$PWD/"; then
              echo "false-green: absolute workspace path in object $o" >&2
              exit 1
            fi
            if strings "$o" | grep -F "file-prefix-map=$PWD"; then
              echo "false-green: prefix-map re-embedded in object $o" >&2
              exit 1
            fi
            # Inventory only: Clang may keep DWARF5 .debug_line_str when clean.
            if readelf -S "$o" 2>/dev/null | grep -q debug_line_str; then
              echo "note: $o has .debug_line_str (needles already scanned)"
            fi
          done
          rm -rf "$tmp"

  macos-dynamic:
    name: macOS dynamic SQLite full
    runs-on: macos-14
    timeout-minutes: 25
