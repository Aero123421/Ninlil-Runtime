  clang-pointer-compare:
    name: Clang pointer-compare sanitizer
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install SQLite3 and OpenSSL 3
        run: >-
          sudo apt-get update && sudo apt-get install -y
          libsqlite3-dev libssl-dev
      - name: Configure pointer-compare sanitizer
        run: >-
          cmake -S . -B build/ci-clang-pointer-compare
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_CXX_COMPILER=clang++
          -DNINLIL_ENABLE_POINTER_COMPARE_SANITIZER=ON
      - name: Build
        run: cmake --build build/ci-clang-pointer-compare --parallel 2
