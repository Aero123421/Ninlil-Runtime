# ESP-IDF target build (M3-prep + M3-basic + experimental owner/cell/loopback
# + durable-storage target gates).
# Separated from host GCC/Clang CI in ci.yml.
# Pins ESP-IDF via the official Docker image tag that matches
# ports/esp-idf/ESP_IDF_VERSION (currently v5.5.3).
# Smoke links clock/entropy/execution + owner-task/cell/loopback + storage.
# Evidence is esp32s3 compile/link only — not device HIL / dual-core race PASS /
# physical power-cut HIL. Does not claim M3 complete, USB, radio, or hardware verify.

name: ESP-IDF

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  esp32s3-component-build:
    name: ESP32-S3 component build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      # actions/checkout v7.0.0 (same pin as host ci.yml)
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Read pinned ESP-IDF version
        id: pin
        run: |
          pin="$(tr -d '[:space:]' < ports/esp-idf/ESP_IDF_VERSION)"
          if [[ ! "$pin" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid ESP_IDF_VERSION: $pin" >&2
            exit 1
          fi
          echo "version=$pin" >> "$GITHUB_OUTPUT"
          echo "Pinned ESP-IDF: $pin"

      - name: Resolve storage partition paths
        run: |
          test -f ports/esp-idf/partitions/ninlil_storage.csv
          test -f ports/esp-idf/hil_app/../partitions/ninlil_storage.csv
          rel="$(sed -n 's/^CONFIG_PARTITION_TABLE_CUSTOM_FILENAME="\(.*\)"/\1/p' \
            ports/esp-idf/smoke_app/sdkconfig.defaults | head -1)"
          test "$rel" = "../partitions/ninlil_storage.csv"
          test -f "ports/esp-idf/smoke_app/${rel}"

      - name: Build combined smoke and storage HIL app for esp32s3
        # Official Espressif setup: published Docker image tag vX.Y.Z
        # (espressif/idf). Image tag must match ports/esp-idf/ESP_IDF_VERSION.
        # No third-party Action required beyond checkout (SHA-pinned above).
        # Post-link gates run inside the same image so xtensa-esp32s3-elf-objdump
        # / nm / readelf are always present — tools missing ⇒ fail, never false-green.
        run: |
          pin="${{ steps.pin.outputs.version }}"
          docker run --rm \
            --user 0:0 \
            -v "$PWD:/project" \
            -w /project \
            "espressif/idf:${pin}" \
            bash -lc '
              set -euo pipefail
              . "${IDF_PATH}/export.sh"
              idf.py -C ports/esp-idf/smoke_app set-target esp32s3 build
              idf.py -C ports/esp-idf/hil_app set-target esp32s3 build
              ELF=ports/esp-idf/smoke_app/build/ninlil_m3_combined_smoke.elf
              SMOKE_MAP=ports/esp-idf/smoke_app/build/ninlil_m3_combined_smoke.map
              HIL_MAP=ports/esp-idf/hil_app/build/ninlil_storage_powercut_hil.map
              HIL_ELF=ports/esp-idf/hil_app/build/ninlil_storage_powercut_hil.elf
              ARCHIVE=ports/esp-idf/smoke_app/build/esp-idf/ninlil/libninlil.a
              SDK=ports/esp-idf/smoke_app/sdkconfig
              # Prefer build/sdkconfig when present (idf may rewrite it there).
              if [[ -f ports/esp-idf/smoke_app/build/config/sdkconfig.h ]]; then
                if [[ -f ports/esp-idf/smoke_app/build/sdkconfig ]]; then
                  SDK=ports/esp-idf/smoke_app/build/sdkconfig
                fi
              fi
              test -f "$ELF"
              test -f "$SMOKE_MAP"
              test -f "$HIL_MAP"
              test -f "$HIL_ELF"
              test -f "$ARCHIVE"
              python3 tools/esp_idf_app_main_frame_gate.py check \
                --elf "${ELF}" \
                --sdkconfig "${SDK}" \
                --objdump xtensa-esp32s3-elf-objdump
              python3 tools/esp_idf_private_symbol_gate.py check \
                --elf "${ELF}" \
                --readelf xtensa-esp32s3-elf-readelf
              # nm cross-check: private helper must not be text GLOBAL default-looking T
              # without hidden (readelf is authoritative for DEFAULT vs HIDDEN).
              xtensa-esp32s3-elf-nm -g "${ELF}" | tee /tmp/ninlil_nm_g.txt >/dev/null
              if xtensa-esp32s3-elf-nm -g "${ELF}" | grep -E " ninlil_esp_idf_cell_config_stage_nested_owner$"; then
                echo "cell_config_stage_nested_owner must not be a global nm symbol" >&2
                exit 1
              fi
              python3 tools/esp_storage_public_api_gate.py \
                --archive "${ARCHIVE}" \
                --archive-kind target \
                --elf "${HIL_ELF}" \
                --nm xtensa-esp32s3-elf-nm \
                --readelf xtensa-esp32s3-elf-readelf \
                --compile-commands ports/esp-idf/smoke_app/build/compile_commands.json
              # Both official maps are required (smoke placement + HIL placement).
              python3 tools/esp_storage_map_gate.py "${SMOKE_MAP}"
              python3 tools/esp_storage_map_gate.py "${HIL_MAP}"
              find ports/esp-idf/smoke_app/build \( \
                -name "esp_storage_*.su" -o \
                -name "*esp_storage_model*.su" \) \
                | tee ports/esp-idf/smoke_app/build/ninlil_su_list.txt
            '

      - name: Enforce target storage stack budget
        run: |
          test -s ports/esp-idf/smoke_app/build/ninlil_su_list.txt
          python3 tools/esp_storage_stack_gate.py --require-su --require-model \
            ports/esp-idf/smoke_app/build
